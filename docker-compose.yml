version: '3.8'
services:
  zookeeper:
    image: confluentinc/cp-zookeeper:${CONFLUENT_VERSION:-7.4.0}
    environment:
      ZOOKEEPER_CLIENT_PORT: ${ZOOKEEPER_PORT:-2181}
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "${ZOOKEEPER_PORT:-2181}:2181"
  
  kafka:
    image: confluentinc/cp-kafka:${CONFLUENT_VERSION:-7.4.0}
    container_name: genie-kafka-1
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    environment:
      # Use the variable to ensure the listener matches your code's .env
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://${HOST_IP:-127.0.0.1}:${KAFKA_PORT:-9092},PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1